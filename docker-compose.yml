services:
  # Mailpit - local SMTP catch-all + web UI for previewing outbound emails.
  #
  # Wire contract (the default dev DSN in .env.default):
  #   MAILER_DSN=smtp://localhost:1025
  # The web app reaches Mailpit on localhost:1025; the scheduler container
  # rewrites localhost -> host.docker.internal in its entrypoint so it reaches
  # the same published port. Override MAILER_DSN in .env.local to deliver real
  # mail from BOTH the web app and the scheduler.
  #
  # See README.md "Local mail (Mailpit)" for the full operational guide.
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP - Symfony sends here
      - "8025:8025"   # Web UI - browser preview
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # Redis - persistent key-value store used for Symfony's cache pools
  # (app, global, user_frontend, admin, lookups, permissions).
  #
  # Wire contract (must match REDIS_URL in .env / .env.local):
  #   REDIS_URL=redis://localhost:6379?persistent=1&retry_interval=0&timeout=0.2
  #
  # See README.md "Cache (Redis)" for the full operational guide.
  redis:
    image: redis:7-alpine
    container_name: selfhelp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # Scheduled-jobs runner - local Docker dev tick source. Runs the same
  # console command the production scheduler container should run every
  # 60 seconds so action emails / notifications can be tested end-to-end.
  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: selfhelp_scheduler
    restart: unless-stopped
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
      mercure:
        condition: service_started
      mailpit:
        condition: service_started
    env_file:
      - path: .env.default
        required: true
      - path: .env.dev
        required: true
      - path: .env.local
        required: false
    environment:
      APP_ENV: dev
      APP_RUNTIME_ENV: dev
      APP_RUNTIME_MODE: web
      REDIS_URL: redis://redis:6379?persistent=1&retry_interval=0&timeout=0.2
      LOCK_DSN: redis://redis:6379
      # MAILER_DSN is intentionally NOT pinned here: the scheduler must deliver
      # mail exactly like the web app, so it inherits MAILER_DSN from the env
      # files above (.env.default -> .env.dev -> .env.local). The entrypoint
      # rewrites a localhost/127.0.0.1 host to host.docker.internal so a
      # host-based dev SMTP (e.g. the published Mailpit on :1025, or a real
      # provider in .env.local) is reachable from inside the container.
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: http://mercure/.well-known/mercure
      SCHEDULED_JOBS_TICK_SECONDS: ${SCHEDULED_JOBS_TICK_SECONDS:-60}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  # Mercure Hub - Caddy build with the Mercure module.
  #
  # The hub holds long-lived SSE connections on behalf of every subscriber
  # (one connection per browser tab, multiplied by every browser tab in the
  # building) so PHP-FPM never has to. Symfony only ever talks to it with a
  # short publishing POST.
  #
  # Wire contract (must match Symfony's MERCURE_* env in .env / .env.dev):
  #   - Publisher JWT secret == MERCURE_PUBLISHER_JWT_KEY
  #   - Subscriber JWT secret == MERCURE_SUBSCRIBER_JWT_KEY
  #   - Public URL exposed at http://localhost:3001/.well-known/mercure
  #
  # See README.md "Real-time push (Mercure)" for the full operational guide.
  mercure:
    image: dunglas/mercure:v0.16
    container_name: selfhelp_mercure
    restart: unless-stopped
    environment:
      # Caddyfile entry point.
      SERVER_NAME: ":80"
      # Same secret on both sides == single shared HMAC. The Symfony env var
      # MERCURE_JWT_SECRET feeds *both* publisher and subscriber tokens.
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      # Allow:
      #   - the Next.js BFF (web frontend, default `http://localhost:3000`)
      #   - the Expo Web dev preview (mobile app, default
      #     `http://localhost:8081`) - the mobile app subscribes to the
      #     hub directly (no BFF) using `react-native-sse`, so its
      #     origin must be on this list.
      #   - the stable Expo Web preview host used by editors, e.g.
      #     `https://mobile-preview.example.com`
      # Tighten this list for production to the exact origin(s) of the
      # BFF / mobile build. Native iOS/Android builds do not send an
      # `Origin` header so CORS does not affect them; only browser
      # subscribers need to be allow-listed here.
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${MERCURE_CORS_ORIGINS:-http://localhost:3000 http://127.0.0.1:3000 http://localhost:8081 http://127.0.0.1:8081 https://mobile-preview.example.com}
        anonymous false
        publish_origins http://localhost http://127.0.0.1
        subscriptions
    ports:
      # External port 3001 -> container port 80. Matches MERCURE_PUBLIC_URL
      # in .env.dev (`http://127.0.0.1:3001/.well-known/mercure`).
      - "3001:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      # Persist the in-memory ring buffer of recent updates so a hub
      # restart does not lose history for clients that reconnect with a
      # `Last-Event-ID:` header.
      - mercure_data:/data
      - mercure_config:/config

volumes:
  mercure_data:
  mercure_config:
  redis_data:
