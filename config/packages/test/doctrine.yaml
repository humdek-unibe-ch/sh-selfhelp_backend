# config/packages/test/doctrine.yaml
doctrine:
    dbal:
        # configure these for your database server
        url: '%env(resolve:DATABASE_URL)%'
        # IMPORTANT: You MUST configure your server version if not using SQLite,
        # either here or in the DATABASE_URL env var (see .env.test)
        # server_version: '16' # For PostgreSQL 16
        # server_version: '8.0.32' # For MySQL 8.0.32
        # server_version: 'mariadb-10.4.10' # For MariaDB

    orm:
        # PHP 8.4 native lazy objects replace generated proxies in
        # doctrine-bundle 3 / ORM 3, so the legacy `auto_generate_proxy_classes`
        # option no longer exists.
        # You may want to use a different DQL custom functions configuration for tests
        # dql:
        #     string_functions:
        #         test_string: App\DQL\TestStringFunction

# DAMA DoctrineTestBundle wraps each test in a transaction that is rolled
# back on tearDown. The QA baseline (qa.admin/editor/user/guest) is seeded
# once by `php bin/console app:test:reset-db` (a separate process, so its
# COMMIT is real); every test then starts from that committed baseline and
# any rows a test writes are discarded automatically.
#
# Limitation: MySQL implicitly COMMITs on DDL (CREATE/ALTER/DROP TABLE), so
# tests that run plugin migrations (which create tables) cannot rely on the
# rollback and must self-clean. Those tests already do (see
# tests/Controller/Api/V1/Admin/Plugin/ManagedModeInstallTest.php).
dama_doctrine_test:
    enable_static_connection: true
    enable_static_meta_data_cache: true
    enable_static_query_cache: true
