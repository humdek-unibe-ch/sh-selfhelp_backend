doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        profiling: true
    orm:
        # PHP 8.4 + Doctrine ORM 3 + doctrine-bundle 3 use native PHP lazy
        # objects instead of generated proxy classes. There is no longer a
        # proxy file on disk, so the legacy Windows rename-race that the old
        # `auto_generate_proxy_classes: file_not_exists` setting was guarding
        # against simply cannot occur. `enable_native_lazy_objects` is the new
        # default (see doctrine-bundle 3 NEWS); it is left implicit.
        controller_resolver:
            auto_mapping: false
        default_entity_manager: default
        entity_managers:
            default:
                validate_xml_mapping: true
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                identity_generation_preferences:
                    Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
                auto_mapping: true
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            entity_managers:
                default:
                    query_cache_driver:
                        type: pool
                        pool: doctrine.system_cache_pool
                    result_cache_driver:
                        type: pool
                        pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
