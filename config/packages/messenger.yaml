framework:
    messenger:
        # Single transport for plugin lifecycle operations
        # (install/update/uninstall). Doctrine-backed so it works on a
        # bare host (no Redis/RabbitMQ required to develop). Production
        # deployments override via MESSENGER_PLUGIN_OPS_DSN to swap to a
        # broker-backed transport, e.g.
        # `redis://localhost:6379/messages?stream=plugin_ops`.
        transports:
            sync: 'sync://'
            plugin_ops:
                # `auto_setup=true` lets the framework create the
                # `messenger_messages` table on first dispatch in dev.
                # Production deployments should pre-create it via
                # `php bin/console messenger:setup-transports` after
                # running migrations.
                dsn: '%env(default:messenger_plugin_ops_dsn_default:MESSENGER_PLUGIN_OPS_DSN)%'
                options:
                    queue_name: plugin_ops
                retry_strategy:
                    max_retries: 0

        routing:
            App\Plugin\Messenger\InstallPluginMessage: plugin_ops
            App\Plugin\Messenger\UpdatePluginMessage: plugin_ops
            App\Plugin\Messenger\UninstallPluginMessage: plugin_ops

when@test:
    framework:
        messenger:
            transports:
                # Sync transport so PHPUnit integration tests see the
                # install/update/uninstall handler run inline and can
                # assert on the resulting plugin row immediately.
                plugin_ops: 'sync://'

parameters:
    # Default Doctrine messenger DSN; overridable via env.
    messenger_plugin_ops_dsn_default: 'doctrine://default?queue_name=plugin_ops&auto_setup=true'
