nelmio_cors:
    defaults:
        origin_regex: true
        # Covers direct API callers such as the Expo mobile/web preview.
        # The Mercure hub has its own browser CORS allow-list in the
        # root docker-compose.yml / MERCURE_CORS_ORIGINS.
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-Client-Type']
        expose_headers: ['Link']
        max_age: 3600
        allow_credentials: true
    paths:
        '^/': null
