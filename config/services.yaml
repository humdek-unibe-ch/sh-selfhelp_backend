# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # JWT token TTL settings from environment variables
    jwt_token_ttl: '%env(int:JWT_TOKEN_TTL)%'
    jwt_refresh_token_ttl: '%env(int:JWT_REFRESH_TOKEN_TTL)%'
    # Impersonation JWT lifetime (seconds). Default 900 s / 15 min.
    # Override with the IMPERSONATION_TOKEN_TTL env var. The `default:900:`
    # prefix lets the container boot even when ops have not set the var
    # (older deployments) — the var ALWAYS resolves to a positive integer.
    jwt_impersonation_token_ttl: '%env(default:jwt_impersonation_token_ttl_default:int:IMPERSONATION_TOKEN_TTL)%'
    jwt_impersonation_token_ttl_default: 900
    # Response-schema validation (expensive). Opt in via env; defaults to false.
    # See docs/developer/05-api-patterns.md.
    validate_response_schema: '%env(bool:default::VALIDATE_RESPONSE_SCHEMA)%'

    # Maximum number of registration codes allowed in the table at any time (overall cap).
    # Override with REGISTRATION_CODE_TOTAL_MAX env var.
    registration_code_total_max_default: 10000
    registration_code_total_max: '%env(int:default:registration_code_total_max_default:REGISTRATION_CODE_TOTAL_MAX)%'

    # Maximum number of codes a single generate request may create.
    # This value is also returned to the frontend as config.generate_max.
    # Override with REGISTRATION_CODE_REQUEST_MAX env var.
    registration_code_request_max_default: 10000
    registration_code_request_max: '%env(int:default:registration_code_request_max_default:REGISTRATION_CODE_REQUEST_MAX)%'

    # Public frontend base URL used when building absolute links for emails
    # (account validation, welcome, password recovery, etc.).
    frontend_base_url: '%env(default:default_frontend_base_url:FRONTEND_BASE_URL)%'
    default_frontend_base_url: 'http://localhost:3000'

    # Directory that hosts the AI section-generation prompt templates
    # (base + generated). Relative paths are resolved against
    # `%kernel.project_dir%` inside BuildPromptTemplateCommand and
    # AdminStyleController::getSectionPromptTemplate. Default: `docs/ai`.
    # See docs/developer/style-schema-endpoint.md.
    ai_prompt_template_dir: '%env(default:default_ai_prompt_template_dir:AI_PROMPT_TEMPLATE_DIR)%'
    default_ai_prompt_template_dir: 'docs/ai'

    # Mercure topic IRI prefix. Topics are opaque identifiers — never
    # dereferenced — but Mercure recommends URL-shaped names so wildcard
    # subscriptions stay unambiguous. See `App\Service\Mercure\MercureTopicResolver`
    # and docs/developer/13-acl-system.md#real-time-acl-push-mercure.
    mercure_topic_prefix: '%env(default:default_mercure_topic_prefix:MERCURE_TOPIC_PREFIX)%'
    default_mercure_topic_prefix: 'https://selfhelp.app'

    # Lifetime (seconds) of the subscriber JWT minted by
    # AuthEventsController::events(). Short on purpose; the BFF re-mints on
    # every Mercure reconnect.
    mercure_subscriber_ttl: '%env(int:default:default_mercure_subscriber_ttl:MERCURE_SUBSCRIBER_TTL)%'
    default_mercure_subscriber_ttl: '3600'

    # CMS version surfaced to plugins (semver compatibility checks). The
    # parameter is consumed by `PluginCompatibilityValidator` and the
    # admin manifest endpoint. Override with `SELFHELP_CMS_VERSION` to
    # match the deployed application version.
    selfhelp.cms_version: '%env(default:selfhelp_cms_version_default:SELFHELP_CMS_VERSION)%'
    selfhelp_cms_version_default: '8.0.0-dev'

    # Plugin SDK contract version exposed to plugin compatibility
    # checks. Mirrors `PLUGIN_API_VERSION` in @selfhelp/shared/plugin-sdk.
    selfhelp.plugin_api_version: '%env(default:selfhelp_plugin_api_version_default:SELFHELP_PLUGIN_API_VERSION)%'
    selfhelp_plugin_api_version_default: '1.1'
    # Default official plugin registry URL. Plugin sources remain
    # DB-backed via `plugin_sources`; this env var only overrides the
    # seeded system source `humdek-public` so an operator can point the
    # official catalogue at a mirror without editing a protected row.
    selfhelp.plugin_default_registry_url: '%env(default:selfhelp_plugin_default_registry_url_default:SELFHELP_PLUGIN_DEFAULT_REGISTRY_URL)%'
    selfhelp_plugin_default_registry_url_default: 'https://humdek-unibe-ch.github.io/sh2-plugin-registry/'

    # Trusted, server-derived instance identity for the instance-scoped
    # system maintenance/update flow. The SelfHelp Manager injects
    # SELFHELP_INSTANCE_ID per instance when it generates the Docker
    # compose/env. The CMS NEVER trusts a browser-supplied instance id;
    # every system endpoint resolves the instance through this value.
    selfhelp.instance_id: '%env(default:selfhelp_instance_id_default:SELFHELP_INSTANCE_ID)%'
    selfhelp_instance_id_default: 'default'

    # Deployed frontend version surfaced in the system version summary.
    # The manager sets SELFHELP_FRONTEND_VERSION to the frontend image
    # version it deployed for this instance; 'unknown' until it does.
    selfhelp.frontend_version: '%env(default:selfhelp_frontend_version_default:SELFHELP_FRONTEND_VERSION)%'
    selfhelp_frontend_version_default: 'unknown'

    # Maintenance-mode flag surfaced in the system version summary.
    selfhelp.maintenance_mode: '%env(bool:default:selfhelp_maintenance_mode_default:SELFHELP_MAINTENANCE_MODE)%'
    selfhelp_maintenance_mode_default: false

    # Plugin safe-mode flag (reuses the emergency SELFHELP_DISABLE_PLUGINS
    # env that config/bundles.php already honours).
    selfhelp.safe_mode: '%env(bool:default:selfhelp_safe_mode_default:SELFHELP_DISABLE_PLUGINS)%'
    selfhelp_safe_mode_default: false

    # Per-instance manager bearer token. The SelfHelp Manager presents this on
    # the public /cms-api/v1/manager/* update-loop endpoints; the CMS verifies
    # it in constant time (SystemManagerController). Empty by default, which
    # DISABLES the manager loop (every manager call is rejected) until the
    # manager generates and injects a per-instance token. NEVER stored in the
    # manifest/lock/inventory/README.
    selfhelp.manager_token: '%env(default:selfhelp_manager_token_default:SELFHELP_MANAGER_TOKEN)%'
    selfhelp_manager_token_default: ''

    # Config-presence inputs for the aggregated system health endpoint. The
    # SystemHealthService only derives a boolean "configured" from these (it
    # NEVER returns the raw value), so a credential-bearing DSN is safe to
    # inject here — it is reduced to configured/not_configured.
    selfhelp.health.mercure_url: '%env(default:selfhelp_health_mercure_url_default:MERCURE_URL)%'
    selfhelp_health_mercure_url_default: ''
    selfhelp.health.mailer_dsn: '%env(default:selfhelp_health_mailer_dsn_default:MAILER_DSN)%'
    selfhelp_health_mailer_dsn_default: ''
    selfhelp.health.messenger_dsn: '%env(default:selfhelp_health_messenger_dsn_default:MESSENGER_TRANSPORT_DSN)%'
    selfhelp_health_messenger_dsn_default: ''

    # Plugin signature verification. The host trusts publisher Ed25519
    # signatures matching the keyIds declared here. Add each publisher's
    # public key on a single line via `SELFHELP_PLUGIN_TRUSTED_KEYS`
    # (semicolon-separated `keyId=base64pubkey` pairs). See
    # docs/plugins/signing.md and docs/plugins/trusted-keys.md.
    selfhelp_plugin_trusted_keys_default: ''
    # Strict by default. Set SELFHELP_PLUGIN_REQUIRE_SIGNATURE=false ONLY
    # for first-boot dev environments where you intentionally install
    # untrusted (signature-less) plugins.
    selfhelp_plugin_require_signature_default: true
    # Maximum .shplugin archive size, in bytes. Defaults to 20 MB.
    selfhelp_plugin_archive_max_bytes_default: 20971520
    # Number of days a `.shplugin` staging dir lives before being
    # eligible for cleanup. `selfhelp:plugin:cleanup-archives` removes
    # `var/plugins/<id>-<ver>/staging/` entries older than this.
    selfhelp_plugin_archive_retention_days_default: 7

    # Plugin Doctrine write-guard toggle. Defaults to true; set to false
    # (SELFHELP_PLUGIN_DATA_ACCESS_GUARD=false) only for transient
    # diagnostics. The guard intercepts entity writes from plugin-origin
    # code and refuses access to protected core tables not declared in
    # plugin.json#dataAccess.write.
    selfhelp_plugin_data_access_guard_default: true

    # Allow a standalone `.shplugin` archive to ship a `composer.json#scripts`
    # block. Defaults to false (production-safe). The Messenger worker
    # already passes `--no-scripts` to every `composer require`, so the
    # rejection is defence-in-depth — set to `true` only for local
    # developer ergonomics where the plugin's own composer.json carries
    # dev-only scripts (`phpstan`, `phpunit`, …) you want to keep. See
    # docs/plugins/installation.md §2 and docs/plugins/shplugin-archive.md
    # under "Failure modes".
    selfhelp_plugin_allow_composer_scripts_default: false

    # Default lock DSNs. `flock` only coordinates processes on a single
    # host (advisory filesystem locks), so it is dev/single-node only.
    # Any multi-process / multi-container / multi-host deployment MUST
    # point both at a shared backend so the scheduled-job runner and the
    # plugin lifecycle stay cluster-safe, e.g.
    # `LOCK_DSN=redis://...` / `PLUGIN_LOCK_DSN=redis://...`.
    # The bundled Docker stack already sets `LOCK_DSN=redis://redis:6379`.
    default_lock_dsn: 'flock'
    default_plugin_lock_dsn: 'flock'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # API Database Route Loader
    App\Routing\ApiRouteLoader:
        tags: [routing.loader]
        arguments:
            $env: '%kernel.environment%'

    # Plugin layer realtime publisher — wraps the Mercure hub.
    App\Plugin\Realtime\PluginRealtimePublisher:
        arguments:
            $topicPrefix: '%mercure_topic_prefix%'

    App\Plugin\Realtime\PluginRealtimePublisherInterface:
        alias: App\Plugin\Realtime\PluginRealtimePublisher

    # Plugin manifest validator — schema path is project-relative.
    App\Plugin\Manifest\PluginManifestValidator:
        arguments:
            $schemaPath: '%kernel.project_dir%/docs/plugins/plugin-manifest.schema.json'

    # Plugin lock-file IO is project-dir-bound.
    App\Plugin\Lifecycle\PluginLockFileReader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Plugin health service — full §17 doctor coverage.
    # The optional args (`httpClient`, `mercureHubUrl`, `mobileHostDir`)
    # wire the live probes: Mercure reachability, per-plugin health
    # endpoint HTTP GET, and `npm ls` of the plugin's mobile package
    # in the mobile host node_modules. Frontend plugins are runtime
    # ESM bundles served from `public/plugin-artifacts/...` and need
    # no npm probe.
    App\Plugin\Health\PluginHealthService:
        arguments:
            $pluginChecks: !tagged_iterator selfhelp.plugin.health_check
            $httpClient: '@http_client'
            $mercureHubUrl: '%env(default::MERCURE_PUBLIC_URL)%'
            $mobileHostDir: '%env(default::SELFHELP_MOBILE_HOST_DIR)%'

    # Plugin scheduled-job dispatcher — wires the tagged iterator
    # for `selfhelp.plugin.scheduled_job_handler` so plugins can
    # register runtime executors for new `jobTypes` lookup codes
    # (declared via the manifest + `ScheduledJobTypeEvent`). Without
    # this, `JobSchedulerService::executeByType` had no way to invoke
    # plugin-contributed job types — they showed up in the admin
    # catalog but always returned `false` at execution time.
    App\Plugin\ScheduledJob\PluginScheduledJobRegistry:
        arguments:
            $handlers: !tagged_iterator selfhelp.plugin.scheduled_job_handler

    App\Plugin\Lifecycle\PluginLockFileWriter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Plugin bundles file writer — atomically generates config/selfhelp_plugin_bundles.php.
    App\Plugin\Bundle\PluginBundlesFileWriter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Persistent plugin safe-mode toggle.
    App\Plugin\Lifecycle\PluginSafeMode:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Install-mode resolver — env-driven, with safe defaults for production.
    App\Plugin\Lifecycle\InstallModeResolver:
        arguments:
            $appEnv: '%kernel.environment%'
            $installModeEnv: '%env(default::SELFHELP_PLUGIN_INSTALL_MODE)%'
            $allowWebPluginInstall: '%env(bool:default::SELFHELP_ALLOW_WEB_PLUGIN_INSTALL)%'

    # Plugin operation lock — wraps the Symfony Lock factory created
    # by `framework.lock.plugin_operation` so concurrent installs
    # across multiple app servers cannot race.
    App\Plugin\Lifecycle\PluginOperationLock:
        arguments:
            $lockFactory: '@lock.plugin_operation.factory'

    # Composer wrapper used by the Messenger worker.
    # Development/trusted-mode handlers stream output line-by-line into
    # plugin_operations.logs_json so Mercure subscribers see live
    # progress. Managed-mode operators run composer themselves and only
    # call selfhelp:plugin:run-operation at the end.
    App\Plugin\PackageManager\PackageManagerRunner:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Plugin dependency policy — surfaces drift between a plugin
    # package's composer.json#require and the host-provided packages
    # exposed via var/plugin-composer/composer.json#provide. Soft check;
    # Composer's solver remains the authoritative gate at install time.
    App\Plugin\Security\PluginDependencyPolicy:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # .shplugin archive pipeline. Extractor extracts the upload to
    # `var/plugins/<id>-<ver>/staging/`, validator verifies signature +
    # checksums, promoter copies to `installed/` + `public/plugin-artifacts/`,
    # cleaner purges orphaned staging dirs.
    App\Plugin\Archive\PluginArchiveExtractor:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $maxBytes: '%env(int:default:selfhelp_plugin_archive_max_bytes_default:SELFHELP_PLUGIN_ARCHIVE_MAX_BYTES)%'

    # Archive validator — wires the composer-scripts allow flag from
    # SELFHELP_PLUGIN_ALLOW_COMPOSER_SCRIPTS. Symfony's Dotenv only
    # populates $_ENV / $_SERVER, so injecting via DI is the only
    # reliable way to pick the value up at runtime.
    App\Plugin\Archive\PluginArchiveValidator:
        arguments:
            $allowComposerScripts: '%env(bool:default:selfhelp_plugin_allow_composer_scripts_default:SELFHELP_PLUGIN_ALLOW_COMPOSER_SCRIPTS)%'

    # ---- System maintenance / update (instance-scoped) ----
    # Persistent, admin-toggleable maintenance switch. The env hard switch
    # (SELFHELP_MAINTENANCE_MODE) forces it on and is not web-clearable; the
    # var/maintenance_mode.lock file is the admin-toggled layer. Never contains
    # secrets.
    App\Service\System\MaintenanceModeService:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $envForced: '%selfhelp.maintenance_mode%'

    # Trusted instance identity + version facts. The instance id is
    # server-derived only (never from a request). Maintenance state is resolved
    # live through MaintenanceModeService.
    App\Service\System\SystemInstanceService:
        arguments:
            $instanceId: '%selfhelp.instance_id%'
            $cmsVersion: '%selfhelp.cms_version%'
            $pluginApiVersion: '%selfhelp.plugin_api_version%'
            $frontendVersion: '%selfhelp.frontend_version%'
            $safeMode: '%selfhelp.safe_mode%'

    # Aggregated instance-scoped health/status. Config inputs are reduced to
    # configured/not_configured inside the service (never echoed back).
    App\Service\System\SystemHealthService:
        arguments:
            $mercureUrl: '%selfhelp.health.mercure_url%'
            $mailerDsn: '%selfhelp.health.mailer_dsn%'
            $messengerTransportDsn: '%selfhelp.health.messenger_dsn%'

    # Manager-facing update-loop controller. Public routes (no permission rows);
    # access is gated by the per-instance manager bearer token verified
    # in-controller.
    App\Controller\Api\V1\Manager\SystemManagerController:
        arguments:
            $managerToken: '%selfhelp.manager_token%'
        tags: ['controller.service_arguments']

    # Read-only registry gateway for the compatibility preflight. Points at
    # the one official unified registry index. Fails soft when offline.
    App\Service\System\HttpSystemRegistryGateway:
        arguments:
            $registryUrl: '%selfhelp.plugin_default_registry_url%registry.json'

    App\Service\System\SystemRegistryGatewayInterface:
        alias: App\Service\System\HttpSystemRegistryGateway

    App\Plugin\Archive\PluginArchivePromoter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Plugin\Archive\PluginRuntimeArtifactFetcher:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Plugin\Archive\PluginArchiveCleaner:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $retentionDays: '%env(int:default:selfhelp_plugin_archive_retention_days_default:SELFHELP_PLUGIN_ARCHIVE_RETENTION_DAYS)%'

    App\Command\Plugin\PluginPurgeStagingCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Canonical signed-payload builder — cross-impl with sign.mjs.
    App\Plugin\Security\SignedPayloadBuilder: ~

    # Unified resolver for registry / url / paste / archive install sources.
    App\Plugin\Manifest\ManifestResolver: ~

    # Default no-op backup hook. Operators or plugins may override by
    # re-aliasing `App\Plugin\Backup\PluginBackupHookInterface` in
    # their own `services.yaml`. There is no tagged iterator: the host
    # uses exactly one backup hook at a time, injected as a singleton
    # into `PluginUpdater` / `PluginPurger`.
    App\Plugin\Backup\NoopPluginBackupHook: ~
    App\Plugin\Backup\PluginBackupHookInterface:
        alias: App\Plugin\Backup\NoopPluginBackupHook

    # Plugin Ed25519 signature verifier — uses the trusted-keys env to
    # check publisher signatures on registry entries and .shplugin
    # archives. Configure with SELFHELP_PLUGIN_TRUSTED_KEYS +
    # SELFHELP_PLUGIN_REQUIRE_SIGNATURE.
    App\Plugin\Security\PluginSignatureVerifier:
        factory: ['App\Plugin\Security\PluginSignatureVerifier', 'fromEnvString']
        arguments:
            $trustedKeysEnv: '%env(default:selfhelp_plugin_trusted_keys_default:SELFHELP_PLUGIN_TRUSTED_KEYS)%'
            $requireSignature: '%env(bool:default:selfhelp_plugin_require_signature_default:SELFHELP_PLUGIN_REQUIRE_SIGNATURE)%'
            $logger: '@logger'
            $appEnv: '%kernel.environment%'

    # Plugin Doctrine write-guard. Refuses entity writes against protected
    # core tables for plugin-origin callers. Toggle off only for diagnostics
    # via SELFHELP_PLUGIN_DATA_ACCESS_GUARD=false.
    App\Plugin\Security\PluginDataAccessGuard:
        arguments:
            $enabled: '%env(default:selfhelp_plugin_data_access_guard_default:bool:SELFHELP_PLUGIN_DATA_ACCESS_GUARD)%'

    # Plugin compatibility validator — checks plugin manifests against
    # the current CMS + SDK version.
    App\Plugin\Versioning\PluginCompatibilityValidator:
        arguments:
            $cmsVersion: '%selfhelp.cms_version%'
            $sdkApiVersion: '%selfhelp.plugin_api_version%'

    # Plugin capability validator — needs the current Symfony env so it
    # can relax the HTTPS-only check on `frontend.runtime.entrypoint`
    # during local development.
    App\Plugin\Security\PluginCapabilityValidator:
        arguments:
            $appEnv: '%kernel.environment%'

    # Admin-facing plugin service. Pinned cmsVersion + sdkApiVersion
    # so the public manifest endpoint can advertise the values the
    # PluginRuntime expects for drift detection.
    App\Plugin\Service\PluginAdminService:
        arguments:
            $cmsVersion: '%selfhelp.cms_version%'
            $sdkApiVersion: '%selfhelp.plugin_api_version%'

    # Plugin registry client — uses the optional auth header from
    # PluginSource and reads its secret from the environment.
    App\Plugin\Registry\PluginSourceUrlResolver:
        arguments:
            $defaultRegistryUrl: '%selfhelp.plugin_default_registry_url%'

    App\Plugin\Registry\RegistryClient: ~

    # API Request Logger Services
    App\Service\Core\ApiRequestLoggerService:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $tokenStorage: '@security.token_storage'
    
    # API Request Logger Listener
    App\EventListener\ApiRequestLoggerListener:
        tags:
            - { name: kernel.event_subscriber }
        arguments:
            $loggerService: '@App\Service\Core\ApiRequestLoggerService'
    
    # Admin Asset Service - needs explicit project directory
    App\Service\CMS\Admin\AdminAssetService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Form File Upload Service - needs explicit project directory
    App\Service\CMS\FormFileUploadService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Interpolation Service - Mustache-based template interpolation
    App\Service\Core\InterpolationService:
        autowire: false
        autoconfigure: false
        arguments: []

    # Response-schema validation toggle wired from the `validate_response_schema` param.
    App\Service\Core\ApiResponseFormatter:
        arguments:
            $validateResponseSchema: '%validate_response_schema%'

    App\Service\Auth\UserValidationService:
        arguments:
            $frontendBaseUrl: '%frontend_base_url%'

    App\Service\Auth\PasswordResetService:
        arguments:
            $frontendBaseUrl: '%frontend_base_url%'

    App\Service\Auth\RegistrationCodeService:
        arguments:
            $totalMax: '%registration_code_total_max%'
            $requestMax: '%registration_code_request_max%'

    # Mercure topic resolver — single source of truth for topic IRIs used
    # by both publishers (AclVersionMercurePublisher) and the subscriber
    # bootstrap endpoint (AuthEventsController).
    App\Service\Mercure\MercureTopicResolver:
        arguments:
            $topicPrefix: '%mercure_topic_prefix%'

    # Auth events controller — issues short-lived Mercure subscriber JWTs.
    # The hub URL is the *public* URL the browser-side BFF connects to (the
    # internal `MERCURE_URL` is only used by Symfony to publish to the hub).
    App\Controller\Api\V1\Auth\AuthEventsController:
        arguments:
            $mercurePublicUrl: '%env(MERCURE_PUBLIC_URL)%'
            $mercureJwtSecret: '%env(MERCURE_JWT_SECRET)%'
            $mercureSubscriberTtl: '%mercure_subscriber_ttl%'
