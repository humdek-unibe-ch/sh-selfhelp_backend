# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # JWT token TTL settings from environment variables
    jwt_token_ttl: '%env(int:JWT_TOKEN_TTL)%'
    jwt_refresh_token_ttl: '%env(int:JWT_REFRESH_TOKEN_TTL)%'
    # Impersonation JWT lifetime (seconds). Default 900 s / 15 min.
    # Override with the IMPERSONATION_TOKEN_TTL env var. The `default:900:`
    # prefix lets the container boot even when ops have not set the var
    # (older deployments) — the var ALWAYS resolves to a positive integer.
    jwt_impersonation_token_ttl: '%env(default:jwt_impersonation_token_ttl_default:int:IMPERSONATION_TOKEN_TTL)%'
    jwt_impersonation_token_ttl_default: 900
    # Response-schema validation (expensive). Opt in via env; defaults to false.
    # See docs/developer/05-api-patterns.md.
    validate_response_schema: '%env(bool:default::VALIDATE_RESPONSE_SCHEMA)%'

    # Public frontend base URL used when building absolute links for emails
    # (account validation, welcome, password recovery, etc.).
    frontend_base_url: '%env(default:default_frontend_base_url:FRONTEND_BASE_URL)%'
    default_frontend_base_url: 'http://localhost:3000'

    # Directory that hosts the AI section-generation prompt templates
    # (base + generated). Relative paths are resolved against
    # `%kernel.project_dir%` inside BuildPromptTemplateCommand and
    # AdminStyleController::getSectionPromptTemplate. Default: `docs/ai`.
    # See docs/developer/style-schema-endpoint.md.
    ai_prompt_template_dir: '%env(default:default_ai_prompt_template_dir:AI_PROMPT_TEMPLATE_DIR)%'
    default_ai_prompt_template_dir: 'docs/ai'

    # Mercure topic IRI prefix. Topics are opaque identifiers — never
    # dereferenced — but Mercure recommends URL-shaped names so wildcard
    # subscriptions stay unambiguous. See `App\Service\Mercure\MercureTopicResolver`
    # and docs/developer/13-acl-system.md#real-time-acl-push-mercure.
    mercure_topic_prefix: '%env(default:default_mercure_topic_prefix:MERCURE_TOPIC_PREFIX)%'
    default_mercure_topic_prefix: 'https://selfhelp.app'

    # Lifetime (seconds) of the subscriber JWT minted by
    # AuthEventsController::events(). Short on purpose; the BFF re-mints on
    # every Mercure reconnect.
    mercure_subscriber_ttl: '%env(int:default:default_mercure_subscriber_ttl:MERCURE_SUBSCRIBER_TTL)%'
    default_mercure_subscriber_ttl: '3600'

    # CMS version surfaced to plugins (semver compatibility checks). The
    # parameter is fetched by `ApiRouteRegistryEvent` and the plugin
    # SDK helpers. Override with `SELFHELP_CMS_VERSION` to match the
    # deployed application version.
    selfhelp.cms_version: '%env(default:selfhelp_cms_version_default:SELFHELP_CMS_VERSION)%'
    selfhelp_cms_version_default: '8.0.0-dev'

    # Plugin SDK contract version exposed to plugin compatibility
    # checks. Mirrors `PLUGIN_API_VERSION` in @selfhelp/shared/plugin-sdk.
    selfhelp.plugin_api_version: '%env(default:selfhelp_plugin_api_version_default:SELFHELP_PLUGIN_API_VERSION)%'
    selfhelp_plugin_api_version_default: '1.0'
    # Default official plugin registry URL. Plugin sources remain
    # DB-backed via `plugin_sources`; this env var only overrides the
    # seeded system source `humdek-public` so an operator can point the
    # official catalogue at a mirror without editing a protected row.
    selfhelp.plugin_default_registry_url: '%env(default:selfhelp_plugin_default_registry_url_default:SELFHELP_PLUGIN_DEFAULT_REGISTRY_URL)%'
    selfhelp_plugin_default_registry_url_default: 'https://humdek-unibe-ch.github.io/sh2-plugin-registry/'

    # Plugin signature verification mode (strict|lenient). Production
    # defaults to strict. Override with SELFHELP_PLUGIN_SIGNATURE_MODE.
    selfhelp_plugin_signature_mode_default: 'strict'

    # Plugin release channels admins are allowed to install from.
    selfhelp.plugin_allowed_channels:
        - 'stable'

    # Default lock DSNs (in-process flock). Production deployments
    # override with `LOCK_DSN=redis://...` / `PLUGIN_LOCK_DSN=redis://...`
    # so the lock is cluster-safe.
    default_lock_dsn: 'flock'
    default_plugin_lock_dsn: 'flock'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # API Database Route Loader
    App\Routing\ApiRouteLoader:
        tags: [routing.loader]
        arguments:
            $env: '%kernel.environment%'
            $cmsVersion: '%selfhelp.cms_version%'

    # Plugin layer realtime publisher — wraps the Mercure hub.
    App\Plugin\Realtime\PluginRealtimePublisher:
        arguments:
            $topicPrefix: '%mercure_topic_prefix%'

    App\Plugin\Realtime\PluginRealtimePublisherInterface:
        alias: App\Plugin\Realtime\PluginRealtimePublisher

    # Plugin manifest validator — schema path is project-relative.
    App\Plugin\Manifest\PluginManifestValidator:
        arguments:
            $schemaPath: '%kernel.project_dir%/docs/plugins/plugin-manifest.schema.json'

    # Plugin lock-file IO is project-dir-bound.
    App\Plugin\Lifecycle\PluginLockFileReader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Plugin health service — full §17 doctor coverage.
    # The four optional args (`httpClient`, `mercureHubUrl`,
    # `frontendHostDir`, `mobileHostDir`) wire the live probes:
    # Mercure reachability, per-plugin health endpoint HTTP GET, and
    # `npm ls` of the plugin's frontend/mobile package in the host
    # node_modules. Leave any of them empty to disable that probe in
    # environments where the dependency is not present.
    App\Plugin\Health\PluginHealthService:
        arguments:
            $pluginChecks: !tagged_iterator selfhelp.plugin.health_check
            $httpClient: '@http_client'
            $mercureHubUrl: '%env(default::MERCURE_PUBLIC_URL)%'
            $frontendHostDir: '%env(default::SELFHELP_FRONTEND_HOST_DIR)%'
            $mobileHostDir: '%env(default::SELFHELP_MOBILE_HOST_DIR)%'

    App\Plugin\Lifecycle\PluginLockFileWriter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Plugin bundles file writer — atomically generates config/selfhelp_plugin_bundles.php.
    App\Plugin\Bundle\PluginBundlesFileWriter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Persistent plugin safe-mode toggle.
    App\Plugin\Lifecycle\PluginSafeMode:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Install-mode resolver — env-driven, with safe defaults for production.
    App\Plugin\Lifecycle\InstallModeResolver:
        arguments:
            $appEnv: '%kernel.environment%'
            $installModeEnv: '%env(default::SELFHELP_PLUGIN_INSTALL_MODE)%'
            $allowWebPluginInstall: '%env(bool:default::SELFHELP_ALLOW_WEB_PLUGIN_INSTALL)%'

    # Plugin operation lock — wraps the Symfony Lock factory created
    # by `framework.lock.plugin_operation` so concurrent installs
    # across multiple app servers cannot race.
    App\Plugin\Lifecycle\PluginOperationLock:
        arguments:
            $lockFactory: '@lock.plugin_operation.factory'

    # Composer / npm wrapper used by orchestrators for dry-runs +
    # development/trusted-mode real installs. Managed-mode CI runs
    # composer/npm directly, never via this PHP wrapper.
    App\Plugin\PackageManager\PackageManagerRunner:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Default no-op backup hook. Operators may override by tagging
    # `selfhelp.plugin.backup_hook` on a service implementing
    # PluginBackupHookInterface.
    App\Plugin\Backup\NoopPluginBackupHook: ~
    App\Plugin\Backup\PluginBackupHookInterface:
        alias: App\Plugin\Backup\NoopPluginBackupHook

    # Plugin signature verifier — strict in production, lenient elsewhere.
    App\Plugin\Security\PluginSignatureVerifier:
        arguments:
            $mode: '%env(default:selfhelp_plugin_signature_mode_default:SELFHELP_PLUGIN_SIGNATURE_MODE)%'
            $publicKeyBase64: '%env(default::SELFHELP_PLUGIN_SIGNATURE_PUBLIC_KEY)%'

    # Plugin compatibility validator — checks plugin manifests against
    # the current CMS + SDK version.
    App\Plugin\Versioning\PluginCompatibilityValidator:
        arguments:
            $cmsVersion: '%selfhelp.cms_version%'
            $sdkApiVersion: '%selfhelp.plugin_api_version%'

    # Plugin registry client — uses the optional auth header from
    # PluginSource and reads its secret from the environment.
    App\Plugin\Registry\PluginSourceUrlResolver:
        arguments:
            $defaultRegistryUrl: '%selfhelp.plugin_default_registry_url%'

    App\Plugin\Registry\RegistryClient: ~

    # Plugin version resolver — channel filter comes from the env.
    App\Plugin\Registry\VersionResolver:
        arguments:
            $allowedChannels: '%selfhelp.plugin_allowed_channels%'
    
    # API Request Logger Services
    App\Service\Core\ApiRequestLoggerService:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $tokenStorage: '@security.token_storage'
    
    # API Request Logger Listener
    App\EventListener\ApiRequestLoggerListener:
        tags:
            - { name: kernel.event_subscriber }
        arguments:
            $loggerService: '@App\Service\Core\ApiRequestLoggerService'
    
    # Admin Asset Service - needs explicit project directory
    App\Service\CMS\Admin\AdminAssetService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Form File Upload Service - needs explicit project directory
    App\Service\CMS\FormFileUploadService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Interpolation Service - Mustache-based template interpolation
    App\Service\Core\InterpolationService:
        autowire: false
        autoconfigure: false
        arguments: []

    # Response-schema validation toggle wired from the `validate_response_schema` param.
    App\Service\Core\ApiResponseFormatter:
        arguments:
            $validateResponseSchema: '%validate_response_schema%'

    App\Service\Auth\UserValidationService:
        arguments:
            $frontendBaseUrl: '%frontend_base_url%'

    # Mercure topic resolver — single source of truth for topic IRIs used
    # by both publishers (AclVersionMercurePublisher) and the subscriber
    # bootstrap endpoint (AuthEventsController).
    App\Service\Mercure\MercureTopicResolver:
        arguments:
            $topicPrefix: '%mercure_topic_prefix%'

    # Auth events controller — issues short-lived Mercure subscriber JWTs.
    # The hub URL is the *public* URL the browser-side BFF connects to (the
    # internal `MERCURE_URL` is only used by Symfony to publish to the hub).
    App\Controller\Api\V1\Auth\AuthEventsController:
        arguments:
            $mercurePublicUrl: '%env(MERCURE_PUBLIC_URL)%'
            $mercureJwtSecret: '%env(MERCURE_JWT_SECRET)%'
            $mercureSubscriberTtl: '%mercure_subscriber_ttl%'
