#
# Backend production image release pipeline (plan: "CI And Release Pipeline" +
# "License Compliance For Distributed Images"). Builds and publishes the three
# signed backend images the unified registry's core release points at:
#
#   ghcr.io/<owner>/selfhelp-backend:<version>
#   ghcr.io/<owner>/selfhelp-worker:<version>
#   ghcr.io/<owner>/selfhelp-scheduler:<version>
#
# For each image it also generates an SPDX SBOM, runs a vulnerability scan,
# enforces the dependency license policy, and (when configured) cosign-signs the
# pushed digest. After this runs, update the core release JSON in the unified
# registry with the real image digests printed in the job summary.

name: docker-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 1.5.0)'
        required: true

permissions:
  contents: read

jobs:
  # Step 8 + 10: dependency license report + policy gate (once, shared by images).
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fail fast when the self-declared release metadata is out of sync with
      # the code: the registry's auto-core-release resolver trusts
      # release-manifest.json at this tag, and the runtime reports
      # selfhelp_cms_version_default — both must match the version being tagged.
      - name: Release manifest consistency
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          CMS_VERSION=$(sed -n "s/^\s*selfhelp_cms_version_default:\s*'\(.*\)'.*/\1/p" config/services.yaml)
          PLUGIN_API=$(sed -n "s/^\s*selfhelp_plugin_api_version_default:\s*'\(.*\)'.*/\1/p" config/services.yaml)
          MANIFEST_API=$(php -r "echo json_decode(file_get_contents('release-manifest.json'))->pluginApiVersion;")
          echo "tag=$VERSION cms_default=$CMS_VERSION plugin_api=$PLUGIN_API manifest_api=$MANIFEST_API"
          [ "$CMS_VERSION" = "$VERSION" ] || { echo "::error::selfhelp_cms_version_default ($CMS_VERSION) != released version ($VERSION). Bump config/services.yaml."; exit 1; }
          [ "$MANIFEST_API" = "$PLUGIN_API" ] || { echo "::error::release-manifest.json pluginApiVersion ($MANIFEST_API) != services.yaml ($PLUGIN_API)."; exit 1; }
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, pdo_mysql, zip
          coverage: none
      - name: Install production dependencies
        run: composer install --no-dev --no-scripts --prefer-dist --no-progress
      - name: Dependency license report
        run: composer licenses --no-dev --format=json > licenses.json
      - name: Enforce license policy
        env:
          ALLOW_LICENSE_OVERRIDE: ${{ vars.ALLOW_LICENSE_OVERRIDE }}
        run: php scripts/check-license-policy.php licenses.json | tee license-report.txt
      - name: Upload license artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-license-report
          path: |
            licenses.json
            license-report.txt

  # Steps 3-5, 7, 9, 13-14: build + SBOM + scan + sign + publish each image.
  images:
    needs: license
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via GitHub OIDC
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: backend
            image: selfhelp-backend
          - target: worker
            image: selfhelp-worker
          - target: scheduler
            image: selfhelp-scheduler
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha

      # Boot-smoke gate BEFORE anything is pushed: the image must boot the
      # Symfony kernel with no host env file or external service available.
      # Regression guard for the missing-/app/.env class of bug, where every
      # published image 500'd on each request and fataled on every console
      # command because the CI build context has no git-ignored `.env`.
      - name: Build image for boot smoke
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          load: true
          tags: ${{ matrix.image }}:boot-smoke
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Boot smoke (kernel must boot without host env)
        run: docker run --rm ${{ matrix.image }}:boot-smoke php bin/console about

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ matrix.image }}.sbom.spdx.json

      # SHA-pinned to the 0.35.0 immutable release — the only tag guaranteed
      # safe after the March 2026 Trivy supply-chain compromise
      # (GHSA-69fq-xp46-6x23). Older tags were force-pushed to malicious
      # commits and later deleted; never pin this action by mutable tag.
      - name: Scan image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: ${{ matrix.image }}.trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ -n "${COSIGN_PRIVATE_KEY}" ]; then
            echo "Signing ${IMAGE}@${DIGEST} with the configured cosign key."
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE}@${DIGEST}"
          else
            echo "Signing ${IMAGE}@${DIGEST} keyless via GitHub OIDC."
            cosign sign --yes "${IMAGE}@${DIGEST}"
          fi

      - name: Upload SBOM + scan
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-supply-chain
          path: |
            ${{ matrix.image }}.sbom.spdx.json
            ${{ matrix.image }}.trivy.sarif

      - name: Record image digest
        run: |
          echo "### ${{ matrix.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- image: \`ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Update the core release JSON in the unified registry with this digest." >> "$GITHUB_STEP_SUMMARY"

      # The build-output digest, preserved per matrix leg so notify-registry can
      # send the REAL built digests (the registry resolver cross-checks them
      # against what GHCR serves — a mismatch is treated as a moved tag).
      - name: Save digest for registry dispatch
        run: |
          mkdir -p /tmp/digests
          echo -n "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.target }}
          path: /tmp/digests/${{ matrix.target }}

  # Hand the new version to the unified registry: auto-core-release resolves
  # compatibility against the latest published frontend and stages the signed,
  # human-reviewed core release PR. Skipped (with a notice) when the optional
  # REGISTRY_DISPATCH_TOKEN secret is absent — the registry's daily reconcile
  # or a manual auto-core-release dispatch covers that case.
  notify-registry:
    needs: images
    runs-on: ubuntu-latest
    env:
      REGISTRY_DISPATCH_TOKEN: ${{ secrets.REGISTRY_DISPATCH_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true
      - name: Dispatch core-image-published to the registry
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          if [ -z "$REGISTRY_DISPATCH_TOKEN" ]; then
            echo "::notice::REGISTRY_DISPATCH_TOKEN is not set — the registry's daily reconcile (or a manual auto-core-release run) will pick up core $VERSION."
            exit 0
          fi
          PAYLOAD=$(printf '{"event_type":"core-image-published","client_payload":{"kind":"core","version":"%s","digests":{"backend":"%s","worker":"%s","scheduler":"%s"}}}' \
            "$VERSION" "$(cat digests/backend)" "$(cat digests/worker)" "$(cat digests/scheduler)")
          echo "$PAYLOAD"
          curl -sf -X POST \
            -H "Authorization: Bearer $REGISTRY_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/sh2-plugin-registry/dispatches" \
            -d "$PAYLOAD"
          echo "::notice::auto-core-release dispatched for core $VERSION — review the staged PR in sh2-plugin-registry."
