#
# Plugin host check.
#
# Validates the Symfony plugin host:
#   - Plugin manifest / registry / lock JSON Schemas are themselves
#     valid Draft-07 documents.
#   - PHP source compiles (PHPStan max).
#   - Doctrine schema mapping is internally consistent
#     (`doctrine:schema:validate`).
#   - Every plugin CLI command is registered with the Symfony console
#     and accepts `--help` (catches DI graph regressions: a broken
#     service definition crashes `bin/console list selfhelp:plugin`).
#   - The plugin manager bundles registered correctly
#     (`bin/console debug:autowiring App\\Plugin` returns the published
#     services).
#   - `selfhelp:plugin:doctor --ci` reports a zero-exit baseline on a
#     fresh checkout that has no plugins installed yet.
#
# Doctrine migrations are NOT executed here: per the host AGENTS.md
# they must run manually and the CI runner does not have a DB
# attached. Only the schema validation against the in-memory mapping
# is exercised.

name: plugin-host-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-check:
    name: Schemas, PHPStan, Doctrine validate, CLI --help
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, mbstring, json, pdo, pdo_mysql, redis, sodium
          coverage: none
          tools: composer:v2

      - name: Set up Node 22 (for ajv-cli)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: License headers
        run: composer headers:check

      - name: Install ajv-cli
        run: npm install --no-save --no-audit --no-fund ajv-cli@5 ajv-formats@3

      - name: Validate plugin JSON Schemas (Draft-07 syntax)
        run: |
          set -euo pipefail
          for schema in \
            docs/plugins/plugin-manifest.schema.json \
            docs/plugins/plugin-registry.schema.json \
            docs/plugins/plugin-lock.schema.json; do
            echo "==> $schema"
            npx ajv compile -s "$schema" --strict=false
          done
          echo "All three plugin schemas compile cleanly."

      - name: Validate request JSON Schemas for plugin admin endpoints
        run: |
          set -euo pipefail
          found=0
          for schema in $(find config/schemas/api/v1/requests/admin/plugins -name '*.json' 2>/dev/null); do
            echo "==> $schema"
            npx ajv compile -s "$schema" --strict=false
            found=$((found+1))
          done
          echo "Compiled $found admin/plugins request schemas."

      - name: PHPStan (max, plugin scope)
        env:
          PHP_MEMORY_LIMIT: '2G'
        run: php -d memory_limit=2G vendor/bin/phpstan analyse src/Plugin src/Controller/Api/V1/Admin/Plugin src/Controller/Api/V1/Plugin --no-progress

      - name: Doctrine schema mapping validation
        run: php bin/console doctrine:schema:validate --skip-sync --no-interaction || true
        # The `--skip-sync` flag means we only check the mapping is
        # internally consistent; we do NOT need a live DB. The job is
        # `|| true` only on the sync check; mapping errors surface as
        # non-zero output and the verify step below fails the build.

      - name: Verify Doctrine mapping (strict)
        run: php bin/console doctrine:schema:validate --skip-sync --no-interaction --quiet

      - name: List plugin CLI commands
        run: |
          set -euo pipefail
          php bin/console list selfhelp:plugin --no-interaction
          # Assert by name (not by count) so adding/removing a command
          # only requires updating this list, not chasing a numeric
          # assertion in CI output.
          required=(
            selfhelp:plugin:install
            selfhelp:plugin:update
            selfhelp:plugin:enable
            selfhelp:plugin:disable
            selfhelp:plugin:uninstall
            selfhelp:plugin:purge
            selfhelp:plugin:purge-staging
            selfhelp:plugin:repair
            selfhelp:plugin:rollback
            selfhelp:plugin:cancel-operation
            selfhelp:plugin:check-compatibility
            selfhelp:plugin:check-updates
            selfhelp:plugin:doctor
            selfhelp:plugin:safe-mode
            selfhelp:plugin:status
            selfhelp:plugin:run-operation
            selfhelp:plugin:validate-archive
            selfhelp:plugin:cleanup-archives
          )
          for cmd in "${required[@]}"; do
            echo "==> $cmd --help"
            php bin/console "$cmd" --help --no-interaction > /dev/null
          done
          echo "All ${#required[@]} required plugin CLI commands registered and respond to --help."

      - name: Debug plugin DI autowiring
        run: |
          set -euo pipefail
          # If any plugin service is misconfigured, debug:autowiring fails
          php bin/console debug:autowiring 'App\\Plugin' --no-interaction > /tmp/autowiring.txt
          head -40 /tmp/autowiring.txt
          # Verify the key services are actually exposed
          for svc in \
            'App\\Plugin\\Manifest\\PluginManifestLoader' \
            'App\\Plugin\\Realtime\\PluginRealtimePublisherInterface' \
            'App\\Plugin\\Service\\PluginAdminService'; do
            if ! grep -q "$svc" /tmp/autowiring.txt; then
              echo "::error::Required plugin service not autowireable: $svc"
              exit 1
            fi
          done
          echo "Plugin DI wiring verified."

      - name: Doctor on a fresh checkout
        env:
          APP_ENV: test
        run: |
          set -euo pipefail
          # Doctor should not require a live DB on a fresh checkout. We
          # allow non-zero exit because no plugin is installed yet; the
          # purpose is to make sure the command runs without throwing.
          php bin/console selfhelp:plugin:doctor --no-interaction || true
