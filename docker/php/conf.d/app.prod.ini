; Production PHP settings for the SelfHelp backend images.
; Applied on top of php.ini-production inside docker/Dockerfile.

expose_php = Off
memory_limit = 256M

; OPcache tuned for an immutable, source-baked image (no timestamp checks).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0

; Realpath cache helps a large Symfony/Doctrine class graph.
realpath_cache_size = 4096k
realpath_cache_ttl = 600
